name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: perplexity/server/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: perplexity/server/web
        run: npm ci

      - name: Build frontend
        working-directory: perplexity/server/web
        run: npm run build

      - name: Lint frontend
        working-directory: perplexity/server/web
        run: npm run lint
